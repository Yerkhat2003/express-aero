services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-erp_aero}
      MYSQL_USER: ${DB_USER:-api}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apipass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-api}
      DB_PASSWORD: ${DB_PASSWORD:-apipass}
      DB_NAME: ${MYSQL_DATABASE:-erp_aero}
      JWT_SECRET: ${JWT_SECRET:-change-me-use-openssl-rand-hex-32}
      ACCESS_EXPIRES_SECONDS: ${ACCESS_EXPIRES_SECONDS:-600}
      REFRESH_EXPIRES_DAYS: ${REFRESH_EXPIRES_DAYS:-7}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
      MINIO_BUCKET: ${MINIO_BUCKET:-erp-aero-files}
      MINIO_USE_SSL: "false"
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      DB_WAIT_RETRIES: "40"
      DB_WAIT_MS: "2000"
      MINIO_WAIT_RETRIES: "40"
      MINIO_WAIT_MS: "2000"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  mysql_data:
  minio_data:
